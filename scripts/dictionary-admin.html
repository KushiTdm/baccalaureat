<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Petit Bac — Dictionnaire IA</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 560px;
    margin: 40px auto;
    padding: 0 20px;
    background: #f5f5f7;
    color: #1c1c1e;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #0d0d0f; color: #f2f2f7; }
    .card { background: #1c1c1e !important; border-color: #2c2c2e !important; }
    input { background: #2c2c2e !important; color: #f2f2f7 !important; border-color: #3a3a3c !important; }
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  .hint { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.5; }
  .card {
    background: #fff;
    border: 1px solid #e5e5ea;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
  }
  label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 6px; }
  input[type="password"], input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #d1d1d6;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .small { font-size: 12px; color: #888; }
  .letters { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .letter-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid #d1d1d6;
    background: #f2f2f7;
    font-weight: 700;
    cursor: pointer;
  }
  .letter-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  .themes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .theme-btn {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #d1d1d6;
    background: #f2f2f7;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .theme-btn.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  button.primary {
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border: none;
    border-radius: 999px;
    background: #4f46e5;
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }
  button.primary:disabled { opacity: .5; cursor: default; }
  table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #e5e5ea; }
  .total { font-weight: 700; margin-top: 12px; }
  .error { color: #d70015; font-size: 13px; margin-top: 10px; white-space: pre-wrap; }
  .status { font-size: 13px; color: #666; margin-top: 10px; }
</style>
</head>
<body>
  <h1>Dictionnaire IA — Petit Bac</h1>
  <p class="hint">
    Outil admin local, indépendant de l'app mobile : appelle directement la
    fonction Supabase <code>dictionary-enrich</code>. Aucun build/rebuild de
    l'app n'est nécessaire pour utiliser ou faire évoluer cet outil — ouvre
    simplement ce fichier dans un navigateur.
  </p>

  <div class="card">
    <label for="key">Clé Gemini (aistudio.google.com, niveau gratuit)</label>
    <input type="password" id="key" placeholder="Coller la clé API Gemini ici" autocomplete="off" />
    <div class="small">
      <label><input type="checkbox" id="remember" style="width:auto;display:inline;margin-right:6px;" /> Mémoriser dans ce navigateur (localStorage, jamais envoyé ailleurs qu'à Supabase/Gemini)</label>
    </div>
  </div>

  <div class="card">
    <label>Lettre à enrichir</label>
    <div class="letters" id="letters"></div>
  </div>

  <div class="card">
    <label>Thème (aucune sélection = toutes catégories)</label>
    <div class="themes" id="themes"></div>
  </div>

  <button class="primary" id="go">Générer des mots</button>
  <div class="status" id="status"></div>
  <div class="error" id="error"></div>
  <div id="results"></div>

<script>
  const SUPABASE_URL = "https://wuubarlhzvpvybxwslac.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1dWJhcmxoenZwdnlieHdzbGFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODUyOTYsImV4cCI6MjA5OTk2MTI5Nn0.N63gmVxyTkyM1AwToCS15WzxtwNMcAuyHv9bmH7tu2Y";
  const GAME_LETTERS = "ABCDEFGHIJLMNOPRSTUV".split("");
  const COOLDOWN_MS = 15000;

  const keyInput = document.getElementById("key");
  const rememberBox = document.getElementById("remember");
  const lettersEl = document.getElementById("letters");
  const themesEl = document.getElementById("themes");
  const goBtn = document.getElementById("go");
  const statusEl = document.getElementById("status");
  const errorEl = document.getElementById("error");
  const resultsEl = document.getElementById("results");

  let selectedLetter = "A";
  let selectedCategoryIds = new Set();
  let cooldownUntil = 0;

  const savedKey = localStorage.getItem("gemini_api_key");
  if (savedKey) { keyInput.value = savedKey; rememberBox.checked = true; }

  GAME_LETTERS.forEach((l) => {
    const btn = document.createElement("button");
    btn.className = "letter-btn" + (l === selectedLetter ? " active" : "");
    btn.textContent = l;
    btn.onclick = () => {
      selectedLetter = l;
      [...lettersEl.children].forEach((b) => b.classList.toggle("active", b.textContent === l));
    };
    lettersEl.appendChild(btn);
  });

  // Thèmes chargés depuis la table `categories` (lecture publique RLS).
  fetch(`${SUPABASE_URL}/rest/v1/categories?select=id,nom&order=id`, {
    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
  })
    .then((r) => r.json())
    .then((cats) => {
      (cats || []).forEach((c) => {
        const btn = document.createElement("button");
        btn.className = "theme-btn";
        btn.textContent = c.nom;
        btn.onclick = () => {
          if (selectedCategoryIds.has(c.id)) {
            selectedCategoryIds.delete(c.id);
          } else {
            selectedCategoryIds.add(c.id);
          }
          btn.classList.toggle("active", selectedCategoryIds.has(c.id));
        };
        themesEl.appendChild(btn);
      });
    })
    .catch((e) => {
      themesEl.textContent = "Impossible de charger les catégories : " + e.message;
    });

  function tickCooldown() {
    const remaining = cooldownUntil - Date.now();
    if (remaining > 0) {
      goBtn.disabled = true;
      goBtn.textContent = `Patiente ${Math.ceil(remaining / 1000)}s...`;
      setTimeout(tickCooldown, 250);
    } else {
      goBtn.disabled = false;
      goBtn.textContent = "Générer des mots";
    }
  }

  goBtn.onclick = async () => {
    const geminiApiKey = keyInput.value.trim();
    errorEl.textContent = "";
    resultsEl.innerHTML = "";

    if (!geminiApiKey) {
      errorEl.textContent = "Colle ta clé Gemini d'abord.";
      return;
    }
    if (rememberBox.checked) {
      localStorage.setItem("gemini_api_key", geminiApiKey);
    } else {
      localStorage.removeItem("gemini_api_key");
    }

    goBtn.disabled = true;
    statusEl.textContent = "Génération en cours...";

    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/dictionary-enrich`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
          "apikey": SUPABASE_ANON_KEY,
        },
        body: JSON.stringify({
          geminiApiKey,
          letter: selectedLetter,
          categorieIds: selectedCategoryIds.size > 0 ? [...selectedCategoryIds] : undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || `Erreur HTTP ${res.status}`);

      statusEl.textContent = `${data.totalAccepted} mot(s) ajouté(s) au total pour la lettre ${data.letter}.`;

      const table = document.createElement("table");
      table.innerHTML = `<tr><th>Catégorie</th><th>Proposés</th><th>Acceptés</th><th>Doublons</th><th>Rejetés</th></tr>` +
        data.results.map((r) =>
          `<tr><td>${r.categorieName}</td><td>${r.proposed}</td><td>${r.accepted}</td><td>${r.duplicates}</td><td>${r.rejected}${r.error ? ` (${r.error})` : ""}</td></tr>`
        ).join("");
      resultsEl.appendChild(table);
    } catch (e) {
      statusEl.textContent = "";
      errorEl.textContent = "Erreur : " + e.message;
    } finally {
      cooldownUntil = Date.now() + COOLDOWN_MS;
      tickCooldown();
    }
  };
</script>
</body>
</html>
